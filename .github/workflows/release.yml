name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN=pqai
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN=pqai.exe; fi
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/$BIN" .

      - name: Package archive
        run: |
          NAME="pqai-${{ matrix.goos }}-${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "../$NAME.zip" pqai.exe
          else
            tar -czf "../$NAME.tar.gz" pqai
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pqai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
